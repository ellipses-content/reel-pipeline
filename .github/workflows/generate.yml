name: Generate and Upload Reel

on:
  schedule:
    - cron: "0 16 * * *"    # 10:00 AM Mountain Time (UTC-6)
    - cron: "30 0 * * *"    # 6:30 PM Mountain Time (UTC-6)
  workflow_dispatch:

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python packages
        run: pip install -r requirements.txt

      - name: Install Whisper for caption sync
        run: pip install openai-whisper

      - name: Fix known MoviePy/Pillow compatibility issue
        run: |
          RESIZE_FILE=$(python -c "import moviepy.video.fx.resize as r; print(r.__file__)")
          sed -i 's/Image.ANTIALIAS/Image.LANCZOS/g' "$RESIZE_FILE"

      - name: Patch MoviePy drawing.py for numpy 2.x compatibility
        run: |
          python -c "
          import moviepy.video.tools.drawing as d
          patch = '''import numpy as np

def blit(im1, im2, pos=None, mask=None, ismask=False):
    if pos is None:
        pos = [0, 0]
    pos = list(pos)
    xp, yp = int(pos[0]), int(pos[1])
    x1, y1 = max(0, xp), max(0, yp)
    x2 = min(xp + im1.shape[1], im2.shape[1])
    y2 = min(yp + im1.shape[0], im2.shape[0])
    xl, yl = x1 - xp, y1 - yp
    xr = xl + (x2 - x1)
    yr = yl + (y2 - y1)
    if (x1 >= x2) or (y1 >= y2):
        return im2
    blitted = im1[yl:yr, xl:xr]
    new_im2 = im2.copy()
    if mask is None:
        if new_im2.ndim == 2 and blitted.ndim == 3:
            blitted = blitted.mean(axis=2).astype(new_im2.dtype)
        elif new_im2.ndim == 3 and blitted.ndim == 2:
            blitted = np.stack([blitted, blitted, blitted], axis=2)
        new_im2[y1:y2, x1:x2] = blitted
    else:
        mask_region = mask[yl:yr, xl:xr]
        if mask_region.ndim == 2:
            mask_region = mask_region[:, :, np.newaxis]
        if ismask:
            if new_im2.ndim == 2 and blitted.ndim == 3:
                blitted = blitted.mean(axis=2).astype(new_im2.dtype)
            elif new_im2.ndim == 3 and blitted.ndim == 2:
                blitted = np.stack([blitted, blitted, blitted], axis=2)
            new_im2[y1:y2, x1:x2] = blitted
        else:
            if blitted.ndim == 2:
                blitted = np.stack([blitted, blitted, blitted], axis=2)
            new_im2[y1:y2, x1:x2] = (mask_region * blitted + (1 - mask_region) * new_im2[y1:y2, x1:x2])
    return new_im2
'''
          with open(d.__file__, 'w') as f:
              f.write(patch)
          print('drawing.py patched successfully')
          "

      - name: Create required folders
        run: mkdir -p temp output

      - name: Recreate .env file from GitHub Secrets
        run: |
          echo "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" >> .env
          echo "PEXELS_API_KEY=${{ secrets.PEXELS_API_KEY }}" >> .env
          echo "JAMENDO_CLIENT_ID=${{ secrets.JAMENDO_CLIENT_ID }}" >> .env
          echo "NTFY_TOPIC=${{ secrets.NTFY_TOPIC }}" >> .env
          echo "YOUTUBE_CLIENT_ID=${{ secrets.YOUTUBE_CLIENT_ID }}" >> .env
          echo "YOUTUBE_CLIENT_SECRET=${{ secrets.YOUTUBE_CLIENT_SECRET }}" >> .env
          echo "APPROVE_TRIGGER_TOKEN=${{ secrets.APPROVE_TRIGGER_TOKEN }}" >> .env

      - name: Recreate YouTube login token from secret
        run: echo "${{ secrets.YOUTUBE_TOKEN_B64 }}" | base64 -d > youtube_token.pickle

      - name: Run the pipeline
        run: python scheduled_run.py

      - name: Commit updated progress tracking
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add topics_progress.txt scheduled_run_log.txt script_history.json
          git diff --staged --quiet || git commit -m "Update progress tracking [automated]"
          git push